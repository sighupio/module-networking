apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - operator-crds.yaml
  - tigera-operator.yaml
  - dummy-dictionary-calico-images.yaml

images:
  - name: quay.io/tigera/operator
    newName: registry.sighup.io/fury/tigera/operator

patches:
  # Patch to set -manage-crds=false in the Tigera Operator deployment
  - path: patches/manage-crds-patch.json
    target:
      kind: Deployment
      name: tigera-operator
      namespace: tigera-operator
